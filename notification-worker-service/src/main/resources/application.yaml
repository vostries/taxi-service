server:
  port: 8083

spring:
  application:
    name: notification-worker-service
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: taxi
    password: taxi
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

worker:
  pool-size: 4
  poll-interval: 2000
